<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | EcoLife</title>

    <link rel="stylesheet" href="css/pages/settings.css" />

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="settings-header">
<h1><i class="fas fa-cog"></i> Settings</h1>
<p>Personalize your EcoLife experience</p>
</header>


<main class="settings-container">

<!-- APPEARANCE -->

<section class="settings-card">

<h2><i class="fas fa-palette"></i> Appearance</h2>

<div class="setting-item">

<div class="setting-info">
<h3>Theme</h3>
<p>Choose between light and dark mode</p>
</div>

<div class="setting-control">

<button id="lightMode" class="btn-theme active">
<i class="fas fa-sun"></i> Light
</button>

<button id="darkMode" class="btn-theme">
<i class="fas fa-moon"></i> Dark
</button>

</div>

</div>


<div class="setting-item">

<div class="setting-info">
<h3>Font Size</h3>
<p>Adjust text size for better readability</p>
</div>

<div class="setting-control font-controls">

<button id="decreaseFont">
<i class="fas fa-minus"></i>
</button>

<span id="fontValue">100%</span>

<button id="increaseFont">
<i class="fas fa-plus"></i>
</button>

</div>

</div>

</section>


<!-- LANGUAGE -->

<section class="settings-card">

<h2><i class="fas fa-globe"></i> Language</h2>

<div class="setting-item">

<div class="setting-info">
<h3>Display Language</h3>
<p>Select your preferred language</p>
</div>

<select id="languageSelect">

<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="es">Spanish</option>
<option value="fr">French</option>

</select>

</div>

</section>


<!-- AUDIO -->

<section class="settings-card">

<h2><i class="fas fa-volume-up"></i> Audio</h2>

<div class="setting-item">

<div class="setting-info">
<h3>Sound Effects</h3>
<p>Enable or disable audio feedback</p>
</div>

<label class="switch">

<input type="checkbox" id="soundToggle" checked>
<span class="slider"></span>

</label>

</div>

</section>


<!-- RESET -->

<section class="settings-actions">

<button id="resetSettings" class="btn-reset">
<i class="fas fa-undo"></i> Reset to Defaults
</button>

</section>

</main>


<script>
document.addEventListener("DOMContentLoaded", () => {

const lightBtn = document.getElementById("lightMode");
const darkBtn = document.getElementById("darkMode");

const increaseFont = document.getElementById("increaseFont");
const decreaseFont = document.getElementById("decreaseFont");

const fontDisplay = document.getElementById("fontValue");

const languageSelect = document.getElementById("languageSelect");

const soundToggle = document.getElementById("soundToggle");

const resetBtn = document.getElementById("resetSettings");


// DEFAULT SETTINGS

let preferences = JSON.parse(localStorage.getItem("ecoSettings")) || {

theme:"light",
fontSize:100,
language:"en",
sound:true

};


// APPLY SETTINGS ON LOAD

applySettings();


// THEME

lightBtn.onclick = () => {

preferences.theme = "light";
saveSettings();

};

darkBtn.onclick = () => {

preferences.theme = "dark";
saveSettings();

};


// FONT SIZE

increaseFont.onclick = () => {

if(preferences.fontSize < 150){

preferences.fontSize += 10;
saveSettings();

}

};

decreaseFont.onclick = () => {

if(preferences.fontSize > 80){

preferences.fontSize -= 10;
saveSettings();

}

};


// LANGUAGE

languageSelect.onchange = () => {

preferences.language = languageSelect.value;
saveSettings();

};


// SOUND

soundToggle.onchange = () => {

preferences.sound = soundToggle.checked;
saveSettings();

};


// RESET SETTINGS

resetBtn.onclick = () => {

preferences = {

theme:"light",
fontSize:100,
language:"en",
sound:true

};

saveSettings();

alert("Settings reset!");

};


// SAVE SETTINGS

function saveSettings(){

localStorage.setItem("ecoSettings", JSON.stringify(preferences));

applySettings();

}


// APPLY SETTINGS

function applySettings(){

// THEME

if(preferences.theme === "dark"){

document.body.classList.add("dark");

darkBtn.classList.add("active");
lightBtn.classList.remove("active");

}
else{

document.body.classList.remove("dark");

lightBtn.classList.add("active");
darkBtn.classList.remove("active");

}


// FONT SIZE

document.body.style.fontSize = preferences.fontSize + "%";

fontDisplay.innerText = preferences.fontSize + "%";


// LANGUAGE

languageSelect.value = preferences.language;


// SOUND

soundToggle.checked = preferences.sound;

}

});
</script>
</body>
</html>
